<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5856D6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
  
  <!-- School Building Icon -->
  <g fill="white">
    <!-- Roof -->
    <polygon points="50,15 20,35 25,35 50,20 75,35 80,35"/>
    
    <!-- Main Building -->
    <rect x="30" y="35" width="40" height="35" rx="2"/>
    
    <!-- Door -->
    <rect x="42" y="50" width="16" height="20" rx="1"/>
    
    <!-- Windows -->
    <rect x="35" y="42" width="8" height="8" rx="1"/>
    <rect x="57" y="42" width="8" height="8" rx="1"/>
    
    <!-- Graduation Cap -->
    <g transform="translate(50, 10)">
      <polygon points="0,8 -25,0 0,-8 25,0" fill="white"/>
      <rect x="-3" y="8" width="6" height="12" fill="white"/>
      <circle cx="0" cy="20" r="3" fill="white"/>
    </g>
  </g>
</svg>
